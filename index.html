<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Буквоежки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ЭКРАН ВЫБОРА -->
<section id="picker" class="screen">
  <h1>Буквоежки</h1>
  <p>Выбери слово и собери его из букв</p>
  <div class="word-tiles" id="wordTiles"></div>
</section>

<!-- ИГРОВОЙ ЭКРАН -->
<section id="game" class="screen hidden">
  <div class="topbar">
    <button class="iconbtn" id="btnReplay" title="Повторить слово">🔊</button>
    <button class="iconbtn" id="btnHome" title="К выбору слова">✕</button>
  </div>
  <div class="stage">
    <div class="reward" id="reward"></div>
    <div class="slots" id="slots"></div>
    <div class="syl-layer" id="sylLayer"></div>
    <div class="receiver hidden" id="receiver"></div>
    <div class="scatter" id="scatter"></div>
    <div class="wordhold hidden" id="wordHold"></div>
    <button class="arrow arrow-left hidden" id="btnPrev" title="Предыдущее слово">◀</button>
    <button class="arrow arrow-right hidden" id="btnNext" title="Следующее слово">▶</button>
  </div>
</section>

<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
